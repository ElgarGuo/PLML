<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>郭瀚翔的物理教程</title>

<link rel="stylesheet" href="../assets/css/style.css">

<style>
/* 避免 sidebar 覆蓋內容 */
body{
    margin:0;
}

#sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
}

/* 讓主內容避開 sidebar */
.hero, .section{
    padding-left:260px;
}
</style>

</head>

<body>

<!-- =========================
     SIDEBAR (external)
========================= -->
<div id="sidebar"></div>

<script>
/* =========================
   LOAD SIDEBAR MODULE
========================= */

fetch("/PLML/assets/components/sidebar.html")
    .then(res => res.text())
    .then(html => {
        document.getElementById("sidebar").innerHTML = html;

        // language system (zh version page)
        document.body.classList.add("zh");
    });
</script>

<!-- =========================
     NAV (optional top switch)
========================= -->
<nav class="nav">
    <a href="../en/">English</a>
</nav>

<!-- =========================
     HERO
========================= -->
<section class="hero">

<h1>郭瀚翔的物理教程</h1>

<h2>多語言理論物理講義系統</h2>

</section>

<!-- =========================
     CONTENT
========================= -->
<section class="section">

<div class="card">
    <h3>理論物理（Theoretical Physics）</h3>
    <p>從數學架構到現代物理理論的完整講義系統。</p>
</div>

<div class="card">
    <h3>經典力學（Classical Mechanics）</h3>
    <p>牛頓力學、拉格朗日與哈密頓形式。</p>
</div>

<div class="card">
    <h3>量子與統計物理</h3>
    <p>量子力學與統計物理的統一描述。</p>
</div>

</section>

</body>

</html>
