<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Physics Lectures</title>

<script>
(function () {

    // 1. 讀取語言
    const lang = navigator.language || navigator.userLanguage || "en";

    // 2. 判斷是否中文
    const isZh = lang.startsWith("zh");

    // 3. 設定目標頁（避免 /zh/en bug）
    const target = isZh ? "/PLML/zh/" : "/PLML/en/";

    // 4. 防止無限跳轉（如果已在正確頁面）
    if (!location.pathname.startsWith(target)) {
        window.location.replace(target);
    }

})();
</script>

</head>

<body>

<!-- fallback（如果 JS 被關閉） -->
<noscript>
    <div style="text-align:center;margin-top:20vh;font-family:sans-serif;">
        <h2>Physics Lectures</h2>
        <p>
            <a href="/PLML/zh/">中文</a> |
            <a href="/PLML/en/">English</a>
        </p>
    </div>
</noscript>

</body>

</html>
