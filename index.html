<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Physics Lectures</title>

<style>

/* =========================
   BASE
========================= */

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#ffffff;
    color:#1d1d1f;
}

/* =========================
   HERO
========================= */

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    /* space for sidebar */
    padding-left:260px;
}

h1{
    font-size:56px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.5px;
}

h2{
    font-size:22px;
    font-weight:400;
    color:#6e6e73;
    margin-top:20px;
}

.small{
    margin-top:40px;
    font-size:14px;
    color:#86868b;
}

/* =========================
   SIDEBAR placeholder style
========================= */

#sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
}

</style>

</head>

<body>

<!-- =========================
     SIDEBAR (loaded externally)
========================= -->
<div id="sidebar"></div>

<script>
/* =========================
   LOAD SIDEBAR (single source)
========================= */

fetch("/PLML/assets/components/sidebar.html")
    .then(res => res.text())
    .then(html => {
        document.getElementById("sidebar").innerHTML = html;

        // language detection (your system)
        const lang = navigator.language || "en";

        if(lang.startsWith("zh")){
            document.body.classList.add("zh");
        } else {
            document.body.classList.add("en");
        }
    });
</script>

<!-- =========================
     MAIN CONTENT
========================= -->

<div class="hero">

<h1>Physics Lectures</h1>

<h2>Lecture Notes on Theoretical Physics</h2>

<div class="small">
Physics Knowledge System (TP / CM / QM / SM / QI)
</div>

</div>

</body>

</html>
